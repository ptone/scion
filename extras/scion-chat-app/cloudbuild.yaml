steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGISTRY}/${_SERVICE_NAME}:${_GIT_SHA}'
      - '-t'
      - '${_REGISTRY}/${_SERVICE_NAME}:latest'
      - '-f'
      - 'extras/scion-chat-app/Dockerfile'
      - '.'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGISTRY}/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGISTRY}/${_SERVICE_NAME}:${_GIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300s'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--no-allow-unauthenticated'

substitutions:
  _REGISTRY: us-central1-docker.pkg.dev/${PROJECT_ID}/scion
  _SERVICE_NAME: scion-chat-app
  _REGION: us-central1
  _GIT_SHA: ${SHORT_SHA}

options:
  dynamic_substitutions: true
  machineType: 'E2_HIGHCPU_8'
